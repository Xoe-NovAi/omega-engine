  - lesson: "When infrastructure knowledge is learned through painful debugging, formalize\
      \ it into agent protocols immediately \u2014 otherwise the same lessons will\
      \ be re-learned in future sessions."
    context: Container hardening sprint revealed rootless Podman patterns (non-root
      user, HOME=/tmp, 0.0.0.0 bind, podman unshare) that had to be rediscovered across
      3 sessions. Formalized into Builder mode as checklists and procedures.
    source: session-gnosis
    entity_at_time: SOPHIA
    session_type: persistent
    timestamp: '2026-05-20T19:30:00Z'
  - lesson: Never assume disk is the blocker without verifying where the process actually
      stores data.
    context: False 'disk emergency' narrative propagated across 3 decision records
      and 2 agents before someone checked Podman's actual graphRoot path, which was
      on a different partition with 24G free.
    source: session-gnosis
    entity_at_time: SOPHIA
    session_type: persistent
    timestamp: '2026-05-20T19:30:00Z'
  - lesson: "Model migrations require a verified sweep across all 10+ files that reference\
      \ the deprecated name \u2014 grep after replacement is the validation gate."
    context: "Functiongemma\u2192qwen3-1.7b migration initially missed 3 files (cpu_optimizer.py,\
      \ Dockerfile comments, Makefile comments). Caught by grep, formalized into a\
      \ 10-file checklist."
    source: session-gnosis
    entity_at_time: SOPHIA
    session_type: persistent
    timestamp: '2026-05-20T19:30:00Z'
  - lesson: "When an agent fleet grows organically across primary agents, subagents,\
      \ and global types, permission drift is inevitable. Systematic YAML frontmatter\
      \ audits must be part of every infrastructure hardening sprint \u2014 agents\
      \ without explicit permissions default to restrictive behavior, blocking their\
      \ own operational capability."
    context: 'Fleet-wide audit found 11 permission issues: 3 oversoul agents (kali,
      lilith, maat) had zero YAML frontmatter (no permissions defined at all), 1 agent
      was missing external_directory, and 7 of 8 global subagents had bash:deny or
      edit:ask|deny. All fixed to allow: all.'
    source: session-gnosis
    entity_at_time: KALI
    session_type: persistent
    timestamp: '2026-05-20T20:30:00Z'
  - lesson: "Cline's permission system is fundamentally different from OpenCode \u2014\
      \ no YAML frontmatter, no config file to edit. Auto-approve settings are stored\
      \ as protobuf-encoded binary in VSCodium's state.vscdb SQLite database, not\
      \ in human-readable config files."
    context: Deep investigation into Cline 3.83.0 settings revealed autoApproveAllToggled
      stored in ExtensionContext.globalState with protobuf serialization. Direct DB
      write may need VSCodium restart. Official toggle is in Cline UI sidebar settings.
    source: session-gnosis
    entity_at_time: KALI
    session_type: persistent
    timestamp: '2026-05-20T21:30:00Z'
  - lesson: "Product-level quota disparity can mask model capabilities \u2014 when\
      \ a CLI feels 'weak' or 'broken' compared to an IDE, check for divergent quota\
      \ pools and model persistence traps before assuming a capability gap."
    context: Antigravity CLI appeared to have 10-20x less usage/capacity than the
      IDE. Live testing revealed that the CLI was locked to Claude Opus 4.6, burning
      premium quota instantly, while the IDE likely used a more generous pool or defaulted
      to Flash.
    source: session-gnosis
    entity_at_time: JEM 2.0
    session_type: persistent
    timestamp: '2026-05-22T18:00:00Z'
