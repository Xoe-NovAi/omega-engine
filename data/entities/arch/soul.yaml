  - l1: Engine-Stack Firewall sweep with 3 parallel subagents uncovered 2 remaining
      violations (bootstrap "SOPHIA" fallback, hardcoded "arch" soul path). Also discovered
      broken WAD manifest schema, missing "default" entity, and 77 hardcoded entity
      references in test suite. All 3 CRITICAL test violations fixed. WAD manifest
      unwrapping added. Default entity added. Config-driven soul path wired.
    l2: The verification loop in a fleet-of-agents system is the weakest link. Account
      1's DD6 verdict was based on stale CDN content, producing a false FAIL. But
      the specific bugs they found (soul path hardcode, entity fallback) were real.
      A hash-compare between committed code and known-good baseline would catch both
      stale-read issues AND actual compliance gaps.
    l3: "The verification agent must read the bytes itself \u2014 never trust another\
      \ agent's report of what the bytes say. Trust in process decays; trust in hash\
      \ comparisons compounds."
