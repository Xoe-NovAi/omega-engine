    entity_at_time: saraswati
    topic: Voice-to-Voice Integration in Omega Engine
    session_id: res_20260520_Voice-to-Voice_Integ
    timestamp: '2026-05-20T19:53:47.477191+00:00'
  - lesson: State persistence must be decoupled from the active processing configuration
