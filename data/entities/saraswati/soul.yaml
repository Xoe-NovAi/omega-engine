  - lesson: The shift from discrete pipeline stages (STT -> LLM -> TTS) to unified
      multimodal streaming is the prerequisite for achieving human-parity conversational
      latency.
    context: Omega Engine can transition from a text-centric gateway (Telegram/WhatsApp)
      to a multimodal voice gateway by implementing these specific network protocols
      in Rust.
    source: background-researcher
