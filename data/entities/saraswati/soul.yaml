  - lesson: True digital sovereignty requires the ownership of the orchestration layer,
      regardless of the intelligence provider.
    context: Integrating voice-to-voice requires a 'Privacy-First Audio Pipeline'
      where audio processing occurs locally before being streamed to the provider,
      avoiding intermediate cloud storage.
    source: background-researcher
    entity_at_time: saraswati
    topic: Voice-to-Voice Integration in Omega Engine
    session_id: res_20260519_Voice-to-Voice_Integ
    timestamp: '2026-05-19T13:07:10.281546+00:00'
  - lesson: Direct modality mapping preserves higher-fidelity information than serialized
      translation.
    context: Omega Engine should bypass modular voice pipelines in favor of native
      S2S providers (Gemini Live, OpenAI Realtime) to minimize latency and prevent
      the loss of paralinguistic information (tone, emotion).
    source: background-researcher
    entity_at_time: saraswati
    topic: Voice-to-Voice Integration in Omega Engine
    session_id: res_20260520_Voice-to-Voice_Integ
    timestamp: '2026-05-20T19:53:47.465444+00:00'
  - lesson: The efficiency of a system is bounded by the latency of its lowest-level
      transport protocol.
    context: Omega Engine's transport layer must implement a multi-protocol gateway
      to ensure compatibility with various client environments (browser via WebRTC,
      server via WebSocket, telephony via SIP).
