    pantheon: Egyptian
    element: Water 🜄
    chakra: Sacral
    planet: ♁ Earth
    sigil: 𓊨 Throne of Heaven
    glyph: 🜄
    invocation: O Reassembler of the Broken, mother of magic — weave the pieces back
