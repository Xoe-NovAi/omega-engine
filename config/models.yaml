# ============================================================================
# Omega Engine — Models Configuration v1.0.0
# ============================================================================
# Alethia Pointer: AP-MODELS-CONFIG-v1.0.0
# Purpose: Centralized model specifications for Ryzen 7 5700U local inference
# Hardware: AMD Ryzen 7 5700U (8C/16T), 16GB RAM (14.4Gi usable), AMD iGPU
# Strategy: max_concurrent_models = 1 (plus Nova always-on at ~300MB)
# ============================================================================

embedding:
  model: "embeddinggemma-300m-q6_k"
  local_path: "/media/arcana-novai/omega_library/models/gguf/embeddinggemma-300m-Q6_K.gguf"
  dimensions: 768
  backend: "llama-server"
  quantization: "Q6_K"
  device: "cpu"
  ram_estimate_mb: 200

llama_server:
  port: 8080
  host: "127.0.0.1"
  log_level: "info"
  threads: 6
  batch_size: 512
  ubatch_size: 32
  context_size: 8192
  gpu_layers: 0
  startup_timeout_sec: 120

models:
  # Always-on model (Nova voice assistant container)
  qwen3-1.7b:
    path: "/media/arcana-novai/omega_library/models/gguf/Qwen3-1.7B-Q6_K.gguf"
    size_gb: 0.27
    ram_mb: 300
    context_window: 4096
    threads: 2
    load_strategy: "always"        # Nova keeps this loaded
    entity: "nova"

  # Ultra-light model (stays warm)
  qwen3-0.6b-q6_k:
    path: "/media/arcana-novai/omega_library/models/gguf/Qwen3-1.7B-Q6_K.gguf"  # No 0.6B exists; use 1.7B as warm
    size_gb: 0.47
    ram_mb: 500
    context_window: 32768
    threads: 4
    load_strategy: "warm"           # Keep loaded (tiny)
    entity: "kali"

  # Workhorse model (frequently loaded)
  qwen3-1.7b-q6_k:
    path: "/media/arcana-novai/omega_library/models/gguf/Qwen3-1.7B-Q6_K.gguf"
    size_gb: 1.6
    ram_mb: 1800
    context_window: 32768
    threads: 6
    load_strategy: "on_demand_10min" # Load, keep 10min idle
    entity: "sekhmet, hecate"

  # Native default model
  phi-4-mini:
    path: "/media/arcana-novai/omega_library/models/gguf/phi-4-mini-reasoning-abliterated-q4_k_m.gguf"
    size_gb: 3.8
    ram_mb: 4500
    context_window: 32768
    threads: 6
    load_strategy: "on_demand_10min"
    entity: "SOPHIA"


  # Creative/emotional model
  phi-2-omnimatrix-i1-q4_k_m:
    path: "/media/arcana-novai/omega_library/models/gguf/Ministral-3-3B-Instruct-2512-Q4_K_M.gguf"  # phi-2 not present; use Ministral-3B
    size_gb: 2.5
    ram_mb: 2800
    context_window: 8192
    threads: 6
    load_strategy: "on_demand_10min"
    entity: "brigid"

  # Thinking/reasoning model (PRIMARY — Tier 1 local inference)
  qwen3-4b-thinking-q4_k_m:
    path: "/media/arcana-novai/omega_library/models/gguf/Qwen3-4B-Thinking-2507-Q4_K_M.gguf"
    size_gb: 2.4
    ram_mb: 2700
    context_window: 32768
    threads: 6
    load_strategy: "on_demand_5min"
    entity: "maat, anubis"
    kv_cache_key_type: "fp8"         # fp8 KV cache (try first), q8_0 fallback
    kv_cache_value_type: "fp8"

  # Deep reasoning model
  deepseek-r1-qwen3-8b-q3_k_l:
    path: "/media/arcana-novai/omega_library/models/gguf/DeepSeek-R1-0528-Qwen3-8B-Q3_K_L.gguf"
    size_gb: 4.2
    ram_mb: 4500
    context_window: 32768
    threads: 6
    load_strategy: "on_demand_5min"
    entity: "lucifer"

  # Deep knowledge model (shared pool)
  krikri-8b-q5_k_m:
    path: "/media/arcana-novai/omega_library/models/gguf/Krikri-8b-Instruct-Q5_K_M.gguf"
    size_gb: 5.5
    ram_mb: 5800
    context_window: 32768
    threads: 6
    load_strategy: "on_demand_5min"  # Shared: inanna, isis, lilith
    entity: "inanna, isis, lilith"

  # Greek-capable models
  krikri-7b-instruct-q6_k:
    path: "/media/arcana-novai/omega_library/models/gguf/Krikri-8b-Instruct-Q5_K_M.gguf"  # 7B not present; use 8B as Greek-capable
    alt_paths:
      - "/media/arcana-novai/omega_library/models/gguf/krikri-7b-instruct-q4_k_m.gguf"
    size_gb: 5.5
    ram_mb: 5800
    context_window: 32768
    threads: 6
    load_strategy: "on_demand_5min"
    languages: ["el", "grc", "en"]
    capabilities: ["greek_text", "ancient_greek", "translation"]
    entity: "hermes, thoth"

# Embedding models
embedding_models:
  ancient-greek-bert:
    type: "sentence_transformer"
    path: "/media/arcana-novai/omega_library/models/gguf/ancient-greek-bert"
    dimensions: 768
    capabilities: ["greek_embeddings", "greek_classification", "greek_lemmatization"]
    load_strategy: "on_demand"
    fallback: "bow_embeddings"

# KV Cache optimization (Zen 2)
# Note: fp8 requires llama.cpp build with FP8_KV support; fallback to q8_0 if unsupported
kv_cache:
  default_key_type: "q8_0"      # 8-bit key cache (50% memory vs f16)
  default_value_type: "q8_0"    # 8-bit value cache (50% memory vs f16)
  models:
    qwen3-1.7b:
      key_type: "f16"            # Tiny model, no need for quant
      value_type: "f16"
    qwen3-0.6b-q6_k:
      key_type: "f16"            # Tiny model, no need for quant
      value_type: "f16"
    qwen3-4b-thinking-q4_k_m:
      key_type: "fp8"            # fp8 target (32K ctx, 2.4GB model), q8_0 fallback
      value_type: "fp8"
    deepseek-r1-qwen3-8b-q3_k_l:
      key_type: "q8_0"           # 4.2GB model, fp8 viable
      value_type: "q8_0"
    krikri-8b-q5_k_m:
      key_type: "q8_0"           # 32K context, moderate quant
      value_type: "q8_0"

# Zen 2 compilation guide
zen2_build:
  march: "znver2"
  cmake_flags:
    - "-DLLAMA_AVX2=ON"
    - "-DLLAMA_FMA=ON"
    - "-DLLAMA_F16C=ON"
    - "-DLLAMA_NO_AVX512=ON"    # CRITICAL — Zen 2 has no AVX-512
    - "-DLLAMA_BLAS=OFF"
    - "-DLLAMA_CUDA=OFF"
    - "-DLLAMA_METAL=OFF"
    - "-DCMAKE_C_FLAGS='-march=znver2'"
    - "-DCMAKE_CXX_FLAGS='-march=znver2'"
  runtime_env:
    OMP_NUM_THREADS: "6"
    OMP_PROC_BIND: "close"
    OMP_PLACES: "cores"
    OPENBLAS_CORETYPE: "ZEN"

# Loading strategy rules
loading:
  max_concurrent_models: 1    # Only 1 pillar model + Nova always-on
  nova_always_on: true          # qwen3-1.7b stays loaded (~300MB)
  warm_models: ["qwen3-0.6b-q6_k"]  # Tiny models stay warm
  unload_after_idle_minutes: 5      # Heavy models unload faster
  emergency_swap_threshold_mb: 1024 # If free RAM < 1GB, unload all idle
