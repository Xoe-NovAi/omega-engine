wad:
  name: "_omega_default — The Company"
  version: "1.0.0"
  requires_engine: ">=0.5.0"
  author: "Xoe-NovAi Foundation"
  description: "The Omega Engine's default IWAD. A software company leadership structure: Founder (Kali) directs, CTO (Ma'at) builds, CISO (Lilith) protects. 10 department heads implement."
  type: iwad
  mode: production
  license: "Apache 2.0"
  
  startup:
    message: |
      The Company is loaded. Kali (Founder) sets direction. Ma'at (CTO) builds the system right. Lilith (CISO) keeps it running. Your team: SysAdmin, DataStore, BuildMaster, Bridge, Sentinel, ModelGate, Context, WatchTower, Link, Verifier.

  entities:
    - "default.yaml"        # Default assistant — general queries
    - "kali.yaml"           # P0: Founder — sets direction
    - "maat.yaml"           # P0: CTO — builds side (P1-P5)
    - "lilith.yaml"         # P0: CISO — run side (P6-P10)
    - "iris.yaml"           # Voice Interface — first contact
    - "sysadmin.yaml"       # P1: Infrastructure
    - "datastore.yaml"      # P2: Data Engineering
    - "buildmaster.yaml"    # P3: Build & Release
    - "bridge.yaml"         # P4: API & Integration
    - "sentinel.yaml"       # P5: Security
    - "modelgate.yaml"      # P6: AI & Inference
    - "context.yaml"        # P7: Memory & State
    - "watchtower.yaml"     # P8: Observability
    - "link.yaml"           # P9: Coordination
    - "verifier.yaml"       # P10: Quality Assurance

  voices:
    primary: "jem.yaml"
    secondary: []

  vr_scenes: []

  dependencies: []
