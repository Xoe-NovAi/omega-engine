omega:
  identity:
    name: Omega Engine
    version: 2.2.0
    description: Local-first, entity-centric, provider-agnostic AI council runtime
    maintainer: Xoe-NovAi
    license: Apache-2.0
  session_header:
    mode: compact
    default_entity: default
  entity:
    active_iwad: _omega_default
    default: default
    user: arch
    allow_transient: true
  data:
    dir: /home/arcana-novai/Documents/Xoe-NovAi/omega-engine/data
    entities_dir: data/entities
    session_log: true
    session_log_dir: data/sessions
  inference:
    strategy: local_first
    hardware:
      cpu: "AMD Ryzen 7 5700U"
      architecture: "zen2"
      physical_cores: [0, 2, 4, 6]
      io_threads: [1, 3, 5, 7, 9, 11]
      threads: 6
      ram_total_mb: 14336
      ram_os_overhead_mb: 2000
      ram_available_ai_mb: 12336
      nova_resident_mb: 300
  observability:
    enable_dataset_collection: false
    enable_trace_logging: true
    trace_length: 12
  hivemind:
    url: "http://127.0.0.1:8016"
    cli: "opencode"
  model_updater:
    enabled: true
    schedule: "0 */6 * * *"
    model: "gemma-4-31b-it"
    thread_limit: 2
    confidence_minimum: 0.85
    max_changes_per_cycle: 30
    providers:
      - name: openrouter
        enabled: true
      - name: google
        enabled: true
      - name: opencode
        enabled: true
    notifications:
      on_change: true
      on_error: true
      channel: observability
