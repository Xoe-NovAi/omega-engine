inference:
  strategy: local_first
  fallback_chain:
    - provider: native-gguf
      priority: 1
      model_path: /media/arcana-novai/omega_library/models/gguf/local/all/phi-4-mini-reasoning-abliterated-q4_k_m.gguf
      n_ctx: 4096
    - provider: google
      priority: 2
      api_key: env:GOOGLE_API_KEY
    - provider: github-copilot
      priority: 4
      models:
        - github-copilot/claude-haiku-4.5
        - github-copilot/gpt-4.1
        - github-copilot/gpt-4o
        - github-copilot/gpt-5-mini
    - provider: kilo
      priority: 5
      models:
        - kilo/deepseek/deepseek-v4-flash:free
        - kilo/anthropic/claude-opus-4.6
        - kilo/openai/gpt-5.4-pro
        - kilo/qwen/qwen3-max-thinking
    - provider: genlabs
      priority: 6
      api_key: env:GENLABS_API_KEY
      base_url: https://openrouter.ai/api/v1
    - provider: lmster
      priority: 4
      endpoint: http://127.0.0.1:1234
    - provider: ollama
      priority: 5
      endpoint: http://127.0.0.1:11434/v1
    - provider: mock
      priority: 10
      enabled: true
