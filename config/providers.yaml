# 🔱 Omega Engine — Provider Fabric
# ⬡ OMEGA ⬡ PROMETHEUS ⬡ deepseek-v4-flash ⬡ opencode ⬡ FABRIC-CONFIG
#
# The fallback chain defines inference priority order.
# Providers are sorted by priority ascending (0 = highest priority).
# Each provider in the chain is tried in order until one succeeds.
#
# Sovereign Provider Priority (per Decision 56 + Deep Audit 2026-05-26):
#   Google → OpenRouter → OpenCode → Copilot → Lmster → Ollama
#   native-gguf deferred to v0.6.0 (llama-cpp-python compilation)
#
# Model Overrides: Each provider can define model_overrides to map
# local GGUF entity model names to cloud/provider-specific model IDs.
# Pattern:  "override map resolver key": "provider model name"
#
# Example: entity uses "qwen3-1.7b-q6_k" → OpenRouter maps to "google/gemma-4-31b-it"

inference:
  strategy: sovereign  # Google primary for Gemma 4 31B; native-gguf deferred
  fallback_chain:

    # ── Primary: Google AI Studio ──────────────────────────────────
    # Provides Gemma 4 31B (unlimited, 262K context).
    # API key: env:GOOGLE_API_KEY (set in .env or shell profile)
    - provider: google
      priority: 0
      api_key: env:GOOGLE_API_KEY

    # ── Fallback: OpenRouter ───────────────────────────────────────
    # Provides access to Gemma 4 31B, GPT-4o, Claude, Qwen, 300+ models.
    - provider: openrouter
      priority: 1
      api_key: env:OPENROUTER_API_KEY
      base_url: https://openrouter.ai/api
      model_overrides:
        qwen3-1.7b-q6_k: google/gemma-4-31b-it
        qwen3-1.7b: google/gemma-4-31b-it
        qwen3-4b-thinking-q4_k_m: qwen/qwen3-4b-thinking
        qwen3-0.6b-q6_k: qwen/qwen3-0.6b
        deepseek-r1-qwen3-8b-q3_k_l: deepseek/deepseek-r1:free
        krikri-8b-q5_k_m: openai/gpt-4o-mini
        phi-2-omnimatrix-i1-q4_k_m: google/gemma-4-31b-it
        roracoon-3b: openai/gpt-4o-mini
      models:
        - google/gemma-4-31b-it

    # ── Fallback: OpenCode Built-in Provider ───────────────────────
    # OpenCode's internal inference capability (config-driven).
    - provider: opencode
      priority: 2
      base_url: http://127.0.0.1:8080/v1

    # ── Fallback: GitHub Copilot ───────────────────────────────────
    - provider: github-copilot
      priority: 3
      models:
        - github-copilot/claude-haiku-4.5
        - github-copilot/gpt-4.1
        - github-copilot/gpt-4o
        - github-copilot/gpt-5-mini

    # ── Fallback: LM Studio / lmster (local, :1234) ────────────────
    - provider: lmster
      priority: 4
      endpoint: http://127.0.0.1:1234
      model_overrides:
        qwen3-4b-thinking-q4_k_m: qwen3-4b-thinking
        qwen3-1.7b-q6_k: qwen3-1.7b

    # ── Fallback: Ollama (local, :11434) ───────────────────────────
    - provider: ollama
      priority: 5
      endpoint: http://127.0.0.1:11434/v1
      model_overrides:
        qwen3-1.7b-q6_k: qwen2.5:0.5b
        qwen3-1.7b: qwen2.5:0.5b

    # ── Deferred: Native GGUF (llama-cpp-python) ───────────────────
    # Requires: pip install llama-cpp-python (CPU build, ~8 min compile)
    # Will be primary local provider in v0.6.0.
    - provider: native-gguf
      priority: 98
      model_path: /media/arcana-novai/omega_library/models/gguf/local/all/phi-4-mini-reasoning-abliterated-q4_k_m.gguf
      n_ctx: 4096

    # ── Last resort: Mock provider (setup instructions) ────────────
    - provider: mock
      priority: 99
      enabled: true
