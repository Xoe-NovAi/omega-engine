# 🔱 Omega Engine — Provider Fabric
# ⬡ OMEGA ⬡ PROMETHEUS ⬡ deepseek-v4-flash ⬡ opencode ⬡ FABRIC-CONFIG
#
# LOCAL-FIRST fallback chain. Order below IS the priority (tried top to bottom).
# Local backends are tried BEFORE cloud. Cloud is fallback, never primary.
#
# Model-specific config (paths, context, threads, KV cache) lives in
# models.yaml — the SINGLE SOURCE OF TRUTH for model specs.
# This file only defines provider endpoints, API keys, and name mappings.
#
# Model Overrides: Each provider can define model_overrides to map
# local GGUF entity model names to provider-specific model IDs.

inference:
  strategy: local_first
  fallback_chain:

    # ── PRIMARY: Native GGUF (llama-cpp-python, Zen 2 optimized) ──────
    - provider: native-gguf
      priority: 0
      # Model path, context, threads, KV cache are read from models.yaml
      # by ModelGateway at init. These are fallback defaults only.
      n_ctx: 8192
      n_ctx_max: 32768
      cores: [0, 2, 4, 6]
      n_threads: 6
      n_threads_batch: 6
      type_k: 8
      type_v: 8
      n_batch: 512
      n_ubatch: 32
      use_mmap: true
      use_mlock: false
      n_gpu_layers: 0

    # ── FALLBACK 1: LM Studio headless (local, :1234) ─────────────────
    - provider: lmster
      priority: 1
      endpoint: http://127.0.0.1:1234
      model_overrides:
        qwen3-4b-thinking-q4_k_m: qwen3-4b-thinking
        qwen3-1.7b-q6_k: qwen3-1.7b
        qwen3-1.7b: qwen3-1.7b
        phi-4-mini: phi-4-mini
        deepseek-r1-qwen3-8b-q3_k_l: deepseek-r1-qwen3-8b
        krikri-8b-q5_k_m: krikri-8b

    # ── FALLBACK 2: Ollama (local, :11434) ────────────────────────────
    - provider: ollama
      priority: 2
      endpoint: http://127.0.0.1:11434/v1
      model_overrides:
        qwen3-1.7b-q6_k: qwen2.5:0.5b
        qwen3-1.7b: qwen2.5:0.5b
        qwen3-0.6b-q6_k: qwen2.5:0.5b

    # ── FALLBACK 3: Google AI Studio (cloud) ───────────────────────────
    - provider: google
      priority: 3
      api_key: env:GOOGLE_API_KEY

    # ── FALLBACK 4: OpenRouter (cloud, 300+ models) ───────────────────
    - provider: openrouter
      priority: 4
      api_key: env:OPENROUTER_API_KEY
      base_url: https://openrouter.ai/api
      model_overrides:
        qwen3-1.7b-q6_k: google/gemma-4-31b-it
        qwen3-1.7b: google/gemma-4-31b-it
        qwen3-4b-thinking-q4_k_m: qwen/qwen3-4b-thinking
        qwen3-0.6b-q6_k: qwen/qwen3-0.6b
        deepseek-r1-qwen3-8b-q3_k_l: deepseek/deepseek-r1:free
        krikri-8b-q5_k_m: openai/gpt-4o-mini
        phi-2-omnimatrix-i1-q4_k_m: google/gemma-4-31b-it
        phi-4-mini: google/gemma-4-31b-it
      models:
        - google/gemma-4-31b-it

    # ── FALLBACK 5: OpenCode Built-in Provider (hybrid) ───────────────
    - provider: opencode
      priority: 5
      base_url: http://127.0.0.1:8080/v1

    # ── FALLBACK 6: GitHub Copilot (cloud) ────────────────────────────
    - provider: github-copilot
      priority: 6
      models:
        - github-copilot/claude-haiku-4.5
        - github-copilot/gpt-4.1
        - github-copilot/gpt-4o
        - github-copilot/gpt-5-mini

    # ── LAST RESORT: Mock provider (setup instructions) ───────────────
    - provider: mock
      priority: 99
      enabled: true
