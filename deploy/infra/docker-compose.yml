# 🔱 PODMAN COMPOSE — Omega Engine Infrastructure v2.0
# Optimized for Ryzen 7 5700U | Rootless Podman | CPU-only inference
# AP: AP-DOCKER-COMPOSE-v2.0.0
#
# Patterns:
#   - Rootless Podman: user "1000:1000", init: true
#   - Network isolation: db-net internal, app-net bridge
#   - RAM gating: strict resource limits aligned with 14Gi total
#   - CPU core steering: compute pinned to physical cores (even)
#   - Storage: omega_library partition (110G) for all persistent data
#   - Models: /media/arcana-novai/omega_library/models/gguf/
#   - SecComp: default Podman seccomp profile (non-root default)
#   - No TLS: internal network only (127.0.0.1 bindings)

version: "3.8"

services:
  # ─────────────────────────────────────────────────────────────
  # REDIS — Cache, Streams, Session State
  # Container: omega-redis | Cores: 1-3 (SMT) | RAM: 256M
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: omega-redis
    restart: unless-stopped
    init: true
    user: "1000:1000"
    cpuset: "1,3"  # SMT threads — lightweight I/O
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-omega}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 300 1
      --appendonly yes
      --appendfsync everysec
      --no-appendfsync-on-rewrite yes
      --lazyfree-lazy-eviction yes
      --lazyfree-lazy-expire yes
    volumes:
      - /media/arcana-novai/omega_library/podman-storage/volumes/redis:/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-omega}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - omega-db-net

  # ─────────────────────────────────────────────────────────────
  # QDRANT — Vector Store for RAG (CPU-optimized)
  # Container: omega-qdrant | Cores: 0,2 (physical) | RAM: 1G
  # Config: AVX2 on, AVX512 off (Zen 2), on-disk vectors, mmap
  # ─────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.1
    container_name: omega-qdrant
    restart: unless-stopped
    init: true
    user: "1000:1000"
    cpuset: "0,2"  # Physical cores — compute-heavy indexing
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - /media/arcana-novai/omega_library/podman-storage/volumes/qdrant:/qdrant/storage
      - ./qdrant_config.yaml:/qdrant/config/config.yaml:ro
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=4
      - QDRANT__STORAGE__OPTIMIZER__CPU_LIMIT=4
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - omega-db-net

  # ─────────────────────────────────────────────────────────────
  # POSTGRESQL — Persistent Storage (Soul Fragments, Memory)
  # Container: omega-postgres | Cores: 5,7 (SMT) | RAM: 512M
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: omega-postgres
    restart: unless-stopped
    init: true
    user: "1000:1000"
    cpuset: "5,7"  # SMT threads — moderate I/O
    environment:
      POSTGRES_USER: omega
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omega}
      POSTGRES_DB: omega
    volumes:
      - /media/arcana-novai/omega_library/podman-storage/volumes/postgres:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "omega"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - omega-db-net

  # ─────────────────────────────────────────────────────────────
  # CADDY — Reverse Proxy (TLS, Routing, Security Headers)
  # Container: omega-caddy | Cores: 9,11 (SMT) | RAM: 64M
  # ─────────────────────────────────────────────────────────────
  caddy:
    image: caddy:2.8-alpine
    container_name: omega-caddy
    restart: unless-stopped
    init: true
    user: "1000:1000"
    cpuset: "9,11"  # SMT threads — negligible CPU
    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /media/arcana-novai/omega_library/podman-storage/volumes/caddy/data:/data
      - /media/arcana-novai/omega_library/podman-storage/volumes/caddy/config:/config
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - omega-app-net

  # ─────────────────────────────────────────────────────────────
  # IRIS — Always-On Voice Assistant (qwen3-1.7b-270m)
  # Container: omega-iris | Cores: 4,6 (physical) | RAM: 512M
  # Build: Dockerfile.iris (python:3.13-slim + qwen3-1.7b)
  # ─────────────────────────────────────────────────────────────
  iris:
    build:
      context: ../..
      dockerfile: Dockerfile.iris
    container_name: omega-iris
    restart: unless-stopped
    init: true
    user: "1000:1000"
    cpuset: "4,6"  # Physical cores — light inference
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - OMEGA_ENTITIES_CONFIG=/app/config/entities.yaml
      - OMEGA_MODELS_CONFIG=/app/config/models.yaml
      - REDIS_URL=redis://:${REDIS_PASSWORD:-omega}@omega-redis:6379
    volumes:
      - ../../config:/app/config:ro
      - /media/arcana-novai/omega_library/podman-storage/cache/iris:/cache
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - omega-app-net
    depends_on:
      redis:
        condition: service_healthy

networks:
  omega-db-net:
    name: omega-db-net
    driver: bridge
    internal: true
  omega-app-net:
    name: omega-app-net
    driver: bridge
